# OpenCode Pocket Kit 发布配置
# 本文件可按需修改。未设置时脚本会使用默认值。

# GitHub 仓库名。为空时使用当前 git remote origin 自动识别。
REPOSITORY_NAME=opencode-pocket-kit

# GitHub owner。为空时从 git remote origin 自动识别。
GITHUB_OWNER=

# 发行包基本名称。
PACKAGE_NAME=opencode-pocket-kit

# 是否自动提交未提交的更改。1=是，0=否。
AUTO_COMMIT_CHANGES=1

# 自动提交时使用的提交信息前缀。
COMMIT_MESSAGE_PREFIX=release

# 发布说明模式：git、manual、both。
# git：使用上一个 tag 以来的提交记录。
# manual：运行时手动输入。
# both：手动输入 + 提交记录。
RELEASE_NOTES_MODE=git

# 是否推送分支和 tag。1=是，0=否。
AUTO_PUSH=1

# 是否创建 GitHub Release 并上传发行包。1=是，0=否。
CREATE_GITHUB_RELEASE=1

# 发行包输出目录。默认 .release。
RELEASE_DIR=.release

# 是否从 git 跟踪中移除误加入仓库的发行 zip。1=是，0=否。
REMOVE_TRACKED_RELEASE_ZIPS=1

# 版本号文件。
VERSION_FILE=VERSION
