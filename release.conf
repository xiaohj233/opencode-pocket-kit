# OpenCode Pocket Kit 一键发布版本配置
# 这个文件使用简单 KEY=VALUE 格式。

# 项目名称和发行包名称。
PACKAGE_NAME=opencode-pocket-kit

# 版本号文件。
VERSION_FILE=VERSION

# 发行包输出目录。该目录不会提交到 Git。
RELEASE_DIR=.release

# 发布说明模式：git / manual / both
# git    = 使用上一个版本标签之后的 Git 提交记录
# manual = 发布时在命令行手动输入
# both   = 手动输入 + Git 提交记录
RELEASE_NOTES_MODE=git

# 是否创建 GitHub Release。需要 gh CLI 且已登录。
CREATE_GITHUB_RELEASE=1

# 是否自动推送当前分支和版本标签。
AUTO_PUSH=1

# 是否自动提交 VERSION、README、docs、scripts 等版本号变更。
AUTO_COMMIT_RELEASE_VERSION=1

# 没有新提交时，如果当前最新 tag 还没有 GitHub Release，则尝试补发这个 tag 的 Release。
PUBLISH_EXISTING_TAG_WHEN_RELEASE_MISSING=1

# 是否把误提交的发行包产物从 Git 跟踪中移除。
REMOVE_TRACKED_RELEASE_ZIPS=1

# Release commit 前缀。
COMMIT_MESSAGE_PREFIX=release
