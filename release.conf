# OpenCode Pocket Kit release automation config
# Repository name used by gh repo create when no remote exists.
REPO_NAME=opencode-pocket-kit

# Branch to push. Empty means current branch.
BRANCH=

# Release notes mode:
# git    = use git commits since last tag
# manual = type release notes in terminal
# both   = manual notes first, then git commits
NOTES_MODE=git

# Publish GitHub release as draft: 0 or 1.
DRAFT=0

# Mark release as prerelease: 0 or 1.
PRERELEASE=0

# Asset name prefix.
ASSET_PREFIX=opencode-pocket-kit

# Directories excluded from generated release zip.
EXCLUDE_DIRS=.git,.github,logs,backups,repo-cache,npm-global,node_modules,dist,release

# Files excluded from generated release zip.
EXCLUDE_FILES=vault\secrets.env.enc
