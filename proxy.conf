# OpenCode Pocket Kit 下载代理配置
# 默认不开启代理；如果你的网络可以直连 GitHub 和 npm，请保持默认值。
# 如果使用 Clash / Mihomo / v2rayN 等本地代理，请把 PROXY_ENABLED 改为 1，并填写 HTTP 代理端口。

PROXY_ENABLED=0
PROXY_HOST=127.0.0.1
PROXY_PORT=
PROXY_SCHEME=http
PROXY_URL=

# npm 源。通常建议使用官方源；如需国内镜像可自行改为 https://registry.npmmirror.com
NPM_REGISTRY=https://registry.npmjs.org

# Git 下载超时。网络较慢时可以适当加大。
GIT_CLONE_TIMEOUT_SECONDS=600
GIT_LSREMOTE_TIMEOUT_SECONDS=90
GIT_LOW_SPEED_LIMIT=1000
GIT_LOW_SPEED_TIME_SECONDS=180

# 安装行为
INSTALL_OMO=1
CLEAN_OLD_LOGS_ON_INSTALL=1
NPM_PACKAGE_TIMEOUT_SECONDS=900

# OMO 设置。保持默认即可。
OMO_PACKAGE=oh-my-openagent
OMO_PLUGIN_NAME=oh-my-openagent
OMO_CONFIG_BASENAME=oh-my-openagent
OMO_RUN_DOCTOR=0

# 诊断或调试时可设为 1。
GIT_VERBOSE=0
